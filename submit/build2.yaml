AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for data project 1'

Resources:

  # ---------------------------------------------------------------------------
  # 1. EC2 Instance
  # ---------------------------------------------------------------------------
  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      # Ubuntu 24.04 LTS in us-east-1 -- update AMI if using a different region:
      # https://cloud-images.ubuntu.com/locator/ec2/
      ImageId: 'ami-0b6c6ebed2801a5cb'   # <-- UPDATE THIS if not in us-east-1
      InstanceType: t3.micro
      KeyName: 'sds'        # <-- UPDATE THIS
      IamInstanceProfile:
        Ref: EC2InstanceProfile
      SecurityGroups:
        - Ref: SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail
            exec > /var/log/userdata.log 2>&1

            # Set BUCKET_NAME for this session
            export BUCKET_NAME='${AnomalyBucket}'

            # Set BUCKET_NAME for all future logins/reboots
            echo "BUCKET_NAME=${AnomalyBucket}" >> /etc/environment

            # System updates and dependencies
            apt-get update -y
            apt-get install -y python3 python3-pip python3-venv git

            # Clone your forked repo
            cd /home/ubuntu
            git clone 'https://github.com/AidanMayhue/anomaly-detection.git'
            chown -R ubuntu:ubuntu anomaly-detection

            # Create virtual environment and install requirements
            cd /home/ubuntu/anomaly-detection
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            deactivate

            # Create a systemd service so the API starts on boot and restarts if it crashes
            cat > /etc/systemd/system/anomaly-api.service << 'EOF'
            [Unit]
            Description=Anomaly Detection FastAPI
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/home/ubuntu/anomaly-detection
            Environment="BUCKET_NAME=${AnomalyBucket}"
            ExecStart=/home/ubuntu/anomaly-detection/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000
            Restart=on-failure

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable anomaly-api.service
            systemctl start anomaly-api.service

  # ---------------------------------------------------------------------------
  # 2. Security Group
  # ---------------------------------------------------------------------------
  SecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allow SSH access and API port 8000'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '10.0.0.2/32'   # <-- UPDATE THIS to your IP, e.g. '1.2.3.4/32'
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: '0.0.0.0/0'

  # ---------------------------------------------------------------------------
  # 3. Elastic IP
  # ---------------------------------------------------------------------------
  ElasticIP:
    Type: 'AWS::EC2::EIP'
    Properties:
      InstanceId:
        Ref: EC2Instance

  # ---------------------------------------------------------------------------
  # 4. S3 Bucket (includes event notification)
  # ---------------------------------------------------------------------------
  AnomalyBucket:
    Type: 'AWS::S3::Bucket'
    DependsOn: SNSTopicPolicy
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'raw/'
                  - Name: suffix
                    Value: '.csv'
            Topic:
              Ref: SNSTopic

  # ---------------------------------------------------------------------------
  # 5. IAM Role and Policy
  # ---------------------------------------------------------------------------
  EC2Role:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: AnomalyBucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                Resource:
                  Fn::GetAtt:
                    - AnomalyBucket
                    - Arn
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:CopyObject'
                  - 's3:HeadObject'
                Resource:
                  Fn::Sub: '${AnomalyBucket.Arn}/*'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles:
        - Ref: EC2Role

  # ---------------------------------------------------------------------------
  # 6. SNS Topic and Subscription
  # ---------------------------------------------------------------------------
  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: 'ds5220-dp1'

  # Allows S3 to publish to the SNS topic
  SNSTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - Ref: SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: 'sns:Publish'
            Resource:
              Ref: SNSTopic

  # SNS subscription -- posts to FastAPI /notify when S3 event fires
  SNSSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn:
        Ref: SNSTopic
      Protocol: http
      Endpoint:
        Fn::Sub: 'http://${ElasticIP}:8000/notify'

# ---------------------------------------------------------------------------
# Outputs -- handy references after the stack is deployed
# ---------------------------------------------------------------------------
Outputs:

  BucketName:
    Description: 'S3 bucket name'
    Value:
      Ref: AnomalyBucket

  PublicIP:
    Description: 'Elastic IP of the EC2 instance'
    Value:
      Ref: ElasticIP

  APIEndpoint:
    Description: 'FastAPI base URL'
    Value:
      Fn::Sub: 'http://${ElasticIP}:8000'

  NotifyEndpoint:
    Description: 'SNS HTTP subscription endpoint'
    Value:
      Fn::Sub: 'http://${ElasticIP}:8000/notify'